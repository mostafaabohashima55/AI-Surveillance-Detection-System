<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Sentinel AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-grid"></div>

  <div class="auth-card" style="max-width:520px;animation:slideUp 0.5s ease">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fas fa-shield-halved"></i></div>
      <div class="auth-logo-text">
        <div class="brand-name">SENTINEL AI</div>
        <div class="brand-sub">Surveillance System</div>
      </div>
    </div>

    <h2 class="auth-title">Create Admin Account</h2>
    <p class="auth-subtitle">Register a new administrator for the surveillance system</p>

    <!-- Step indicator -->
    <div class="d-flex align-items-center gap-2 mb-4">
      <div id="step1ind" style="height:3px;flex:1;border-radius:99px;background:#00d4ff;transition:all 0.3s"></div>
      <div id="step2ind" style="height:3px;flex:1;border-radius:99px;background:rgba(255,255,255,0.1);transition:all 0.3s"></div>
    </div>

    <!-- Step 1: Account Info -->
    <div id="step1">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="auth-label">First Name</label>
          <input type="text" class="form-control auth-input" id="regFirstName" placeholder="Ahmad">
          <div class="err-msg" id="err-first" style="color:#ff3b5c;font-size:0.72rem;margin-top:4px"></div>
        </div>
        <div class="col-sm-6">
          <label class="auth-label">Last Name</label>
          <input type="text" class="form-control auth-input" id="regLastName" placeholder="Al-Rashid">
          <div class="err-msg" id="err-last" style="color:#ff3b5c;font-size:0.72rem;margin-top:4px"></div>
        </div>
        <div class="col-12">
          <label class="auth-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text" style="background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.08)!important;color:rgba(255,255,255,0.25)!important"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control auth-input" id="regEmail" placeholder="admin@sentinel.ai" style="border-left:none!important;border-radius:0 10px 10px 0!important">
          </div>
          <div class="err-msg" id="err-email" style="color:#ff3b5c;font-size:0.72rem;margin-top:4px"></div>
        </div>
        <div class="col-12">
          <label class="auth-label">Role</label>
          <select class="form-control auth-input" id="regRole" style="cursor:pointer">
            <option value="">Select a role...</option>
            <option value="Admin">Admin — Full access to all features</option>
            <option value="Viewer">Viewer — Read-only access</option>
          </select>
          <div class="err-msg" id="err-role" style="color:#ff3b5c;font-size:0.72rem;margin-top:4px"></div>
        </div>
      </div>
      <button type="button" class="btn-auth mt-4" onclick="goStep2()">
        Next Step <i class="fas fa-arrow-right ms-2"></i>
      </button>
    </div>

    <!-- Step 2: Password & Security -->
    <div id="step2" style="display:none">
      <div class="d-flex flex-column gap-3">
        <div>
          <label class="auth-label">Password</label>
          <div class="input-group">
            <span class="input-group-text" style="background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.08)!important;color:rgba(255,255,255,0.25)!important"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control auth-input" id="regPass" placeholder="Min. 8 characters"
              oninput="checkPasswordStrength(this.value)"
              style="border-left:none!important;border-right:none!important;border-radius:0!important">
            <span class="input-group-text" id="toggleRegPass" style="cursor:pointer;background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.08)!important;color:rgba(255,255,255,0.25)!important;border-radius:0 10px 10px 0!important">
              <i class="fas fa-eye" id="regPassEye"></i>
            </span>
          </div>
          <!-- Password Strength -->
          <div class="mt-2">
            <div class="d-flex gap-1 mb-1">
              <div class="strength-bar" id="sb1" style="height:3px;flex:1;border-radius:99px;background:rgba(255,255,255,0.08);transition:all 0.3s"></div>
              <div class="strength-bar" id="sb2" style="height:3px;flex:1;border-radius:99px;background:rgba(255,255,255,0.08);transition:all 0.3s"></div>
              <div class="strength-bar" id="sb3" style="height:3px;flex:1;border-radius:99px;background:rgba(255,255,255,0.08);transition:all 0.3s"></div>
              <div class="strength-bar" id="sb4" style="height:3px;flex:1;border-radius:99px;background:rgba(255,255,255,0.08);transition:all 0.3s"></div>
            </div>
            <div id="strengthLabel" style="font-size:0.68rem;color:rgba(255,255,255,0.3)"></div>
          </div>
          <div class="err-msg" id="err-pass" style="color:#ff3b5c;font-size:0.72rem;margin-top:4px"></div>
        </div>

        <div>
          <label class="auth-label">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text" style="background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.08)!important;color:rgba(255,255,255,0.25)!important"><i class="fas fa-lock-open"></i></span>
            <input type="password" class="form-control auth-input" id="regPassConfirm" placeholder="Re-enter password"
              style="border-left:none!important;border-radius:0 10px 10px 0!important">
          </div>
          <div class="err-msg" id="err-confirm" style="color:#ff3b5c;font-size:0.72rem;margin-top:4px"></div>
        </div>

        <div style="padding:14px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.1);border-radius:10px">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="agreeTerms" style="accent-color:#00d4ff">
            <label class="form-check-label" for="agreeTerms" style="font-size:0.78rem;color:rgba(255,255,255,0.45)">
              I agree to the <a href="#" style="color:#00d4ff">Terms of Service</a> and <a href="#" style="color:#00d4ff">Privacy Policy</a>
            </label>
          </div>
        </div>
      </div>

      <div class="d-flex gap-3 mt-4">
        <button type="button" onclick="goStep1()" class="btn-auth" style="flex:0.4;background:rgba(255,255,255,0.07)">
          <i class="fas fa-arrow-left me-2"></i> Back
        </button>
        <button type="button" class="btn-auth" style="flex:1" onclick="doRegister()">
          <span id="regBtnText"><i class="fas fa-user-plus me-2"></i>Create Account</span>
          <span id="regBtnLoader" style="display:none"><div class="loader-ring" style="width:20px;height:20px;border-width:2px;display:inline-block;vertical-align:middle"></div></span>
        </button>
      </div>
    </div>

    <div class="auth-footer mt-4">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/shared.js" defer></script>
<script src="js/register.js" defer></script>
</body>
</html>
