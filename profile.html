<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Sentinel AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="text-center">
    <div class="loader-ring mx-auto mb-3"></div>
    <div style="font-family:'Rajdhani',sans-serif;color:rgba(0,212,255,0.7);font-size:0.75rem;letter-spacing:0.2em">INITIALIZING SENTINEL AI</div>
  </div>
</div>

<div class="profile-page-wrap">
  <div class="container profile-container">
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
      <div>
        <div class="breadcrumb"><i class="fas fa-home"></i> / <span data-i18n="profile">Profile</span></div>
        <h1 class="profile-title" data-i18n="profile">Profile</h1>
      </div>
      <a href="index.html" class="btn-outline-custom"><i class="fas fa-arrow-left"></i> <span data-i18n="backToDashboard">Back to Dashboard</span></a>
    </div>

    <div class="card profile-card">
      <div class="card-header">
        <div class="card-icon" style="background:rgba(0,212,255,0.1);color:#00d4ff"><i class="fas fa-user"></i></div>
        <span class="card-title" data-i18n="accountInformation">Account Information</span>
      </div>
      <div class="card-body">
        <form id="profileForm" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="name" data-i18n="fullName">Full Name</label>
              <input class="form-control" id="name" type="text" data-i18n="fullNamePlaceholder" placeholder="Enter your full name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="email" data-i18n="emailAddress">Email Address</label>
              <input class="form-control" id="email" type="email" data-i18n="emailPlaceholder" placeholder="name@example.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="currentPassword">Current Password</label>
              <input class="form-control" id="currentPassword" type="password" placeholder="Enter current password" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="newPassword">New Password</label>
              <input class="form-control" id="newPassword" type="password" placeholder="Enter new password" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="confirmNewPassword">Confirm New Password</label>
              <input class="form-control" id="confirmNewPassword" type="password" placeholder="Confirm new password" required>
            </div>
          </div>
          <div class="mt-4 d-flex align-items-center gap-2 flex-wrap">
            <button class="btn-primary-custom" type="submit"><i class="fas fa-save"></i> <span data-i18n="saveChanges">Save Changes</span></button>
            <span id="profileSavedText" class="profile-status-text"></span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/shared.js" defer></script>
<script src="js/profile.js" defer></script>
</body>
</html>
